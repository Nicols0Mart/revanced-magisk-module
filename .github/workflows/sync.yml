name: Sync Upstream
on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Sync repo
        run: gh repo sync ${{ github.repository }} -b main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}